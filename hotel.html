        }
        .Main{

        }
        .Medium:hover{
            transform: translateY(-20px);
            background-color: black;
            border: silver 3px solid;
        }
        .Medium:hover img{
            border: silver 2px solid;
        }
        .Medium:hover button{

            color: black;

        }
